# Manual release — bumps version, publishes to npm, pushes commit + tag.
#
# Run: Actions → Release → Run workflow → pick patch/minor/major.
#
# Order matters:
#   1. bump package.json + create local tag (npm version)
#   2. publish to npm            ← if this fails, nothing is pushed → clean rollback
#   3. push commit + tag         ← record of the release
#
# The tag push does NOT re-trigger publish.yml because pushes made with
# GITHUB_TOKEN don't fan out to other workflows (GitHub anti-loop rule).

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git as github-actions bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install (if lockfile present)
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          fi

      - name: Bump version + create tag
        run: |
          npm version ${{ inputs.bump }} -m "Release v%s"
          echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push commit + tag
        run: git push --follow-tags

      - name: Summary
        run: |
          echo "### Released \`$(node -p "require('./package.json').name")@$NEW_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- npm: https://www.npmjs.com/package/$(node -p "require('./package.json').name")" >> $GITHUB_STEP_SUMMARY
